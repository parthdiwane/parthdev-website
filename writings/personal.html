<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parth | Personal Writing</title>
    <meta
      name="description"
      content="Personal writing by Parth Diwane, sorted by date."
    />
    <link rel="icon" type="image/jpeg" href="../gojored.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,600;6..96,700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serifdisplay: ['"Bodoni Moda"', "Georgia", "serif"],
            },
            colors: {
              ink: "#000000",
              mist: "#5f584f",
              bone: "#EEF2F7",
              boneSoft: "#f8fbff",
              line: "rgba(17,17,17,0.12)",
              lineStrong: "rgba(17,17,17,0.24)",
            },
            boxShadow: {
              panel: "0 22px 60px rgba(47, 37, 24, 0.08)",
            },
            backgroundImage: {
              shell:
                "radial-gradient(circle at top left, rgba(255,255,255,0.58), transparent 30%), radial-gradient(circle at top right, rgba(221,230,241,0.75), transparent 34%), linear-gradient(180deg, #f8fbff 0%, #EEF2F7 100%)",
              panel:
                "linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.44))",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-shell font-serifdisplay text-ink antialiased">
    <main
      id="writing-page"
      data-category="personal"
      class="mx-auto w-[min(980px,calc(100%-2rem))] px-4 py-8 sm:px-6 md:px-8 md:py-10"
    >
      <a href="../index.html#writing" class="text-sm uppercase tracking-[0.16em] text-mist transition hover:text-ink">
        [back]
      </a>

      <section class="mt-8">
        <p class="text-[0.8rem] uppercase tracking-[0.2em] text-mist">writing</p>
        <h1 id="writing-title" class="mt-3 text-5xl leading-[0.95] tracking-[-0.05em] md:text-[4.8rem]"></h1>
        <div class="mt-5 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
          <p id="writing-description" class="max-w-2xl text-lg leading-8 text-mist"></p>
          <p id="writing-count" class="text-sm uppercase tracking-[0.16em] text-mist"></p>
        </div>
      </section>

      <nav class="mt-8 flex flex-wrap gap-3 text-sm uppercase tracking-[0.14em] text-mist">
        <a href="academic.html" class="rounded-full border border-line bg-white/60 px-4 py-2 transition hover:border-ink hover:text-ink">[academic]</a>
        <a href="personal.html" class="rounded-full border border-ink bg-ink px-4 py-2 font-semibold text-white shadow-panel">[personal]</a>
        <a href="misc.html" class="rounded-full border border-line bg-white/60 px-4 py-2 transition hover:border-ink hover:text-ink">[misc]</a>
        <a href="all.html" class="rounded-full border border-line bg-white/60 px-4 py-2 transition hover:border-ink hover:text-ink">[all writings]</a>
      </nav>

      <section id="writing-list" class="mt-10 grid gap-0"></section>
    </main>

    <script src="../assets/js/writing-data.js"></script>
    <script src="../assets/js/writing-page.js"></script>
  </body>
</html>

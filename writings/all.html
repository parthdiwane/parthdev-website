<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Parth | All Writings</title>
    <meta
      name="description"
      content="All writing by Parth Diwane, sorted by date."
    />
    <link rel="icon" type="image/jpeg" href="../gojored.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/theme.css" />
    <script src="../assets/js/theme-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-shell font-serif text-ink antialiased">
    <main
      id="writing-page"
      data-category="all"
      class="mx-auto w-[min(980px,calc(100%-2rem))] px-4 py-8 sm:px-6 md:px-8 md:py-10"
    >
      <div class="flex flex-wrap items-center justify-between gap-3">
        <a href="../index.html#writing" aria-label="Back" class="inline-flex items-center text-mist transition hover:text-ink">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
            <path d="M19 12H5" />
            <path d="m12 19-7-7 7-7" />
          </svg>
        </a>
        <button
          type="button"
          data-theme-toggle
          class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-line bg-surfaceMuted text-mist transition hover:border-ink hover:text-ink"
        >
          <!-- Moon: shown in light mode, click to go dark -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="block h-4 w-4 dark:hidden"
          >
            <path d="M14.5 2.5a8.8 8.8 0 1 0 7 14.2A7.8 7.8 0 0 1 14.5 2.5Z" />
          </svg>
          <!-- Sun: shown in dark mode, click to go light -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.7"
            class="hidden h-4 w-4 dark:block"
          >
            <circle cx="12" cy="12" r="3.5" />
            <path d="M12 1.75V4" />
            <path d="M12 20v2.25" />
            <path d="m4.22 4.22 1.6 1.6" />
            <path d="m18.18 18.18 1.6 1.6" />
            <path d="M1.75 12H4" />
            <path d="M20 12h2.25" />
          </svg>
        </button>
      </div>

      <section class="mt-8">
        <p class="text-[0.8rem] uppercase tracking-[0.2em] text-mist">writing</p>
        <h1 id="writing-title" class="mt-3 text-5xl leading-[0.95] tracking-[-0.05em] md:text-[4.8rem]"></h1>
        <div class="mt-5 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
          <p id="writing-description" class="max-w-2xl text-lg leading-8 text-mist"></p>
          <p id="writing-count" class="text-sm uppercase tracking-[0.16em] text-mist"></p>
        </div>
      </section>

      <nav class="mt-8 flex flex-wrap gap-3 text-sm uppercase tracking-[0.14em] text-mist">
        <a href="academic.html" class="rounded-full border border-line bg-surfaceMuted px-4 py-2 transition hover:border-ink hover:text-ink">[academic]</a>
        <a href="personal.html" class="rounded-full border border-line bg-surfaceMuted px-4 py-2 transition hover:border-ink hover:text-ink">[personal]</a>
        <a href="misc.html" class="rounded-full border border-line bg-surfaceMuted px-4 py-2 transition hover:border-ink hover:text-ink">[misc]</a>
        <a href="all.html" class="rounded-full border border-inverse bg-inverse px-4 py-2 font-semibold text-inverseText shadow-panel">[all writings]</a>
      </nav>

      <section id="writing-list" class="mt-10 grid gap-0"></section>
    </main>

    <script src="../assets/js/writing-data.js"></script>
    <script src="../assets/js/writing-page.js"></script>
    <script src="../assets/js/theme-toggle.js"></script>
  </body>
</html>
